schemaVersion: 1
name: "srvcs-xnor"
slug: "xnor"
repository: "srvcs/xnor"
package: "srvcs-xnor"
function: "logic: NOT XOR (equivalence)"
kind: "orchestrator"
categories:
  - "logic"
dependencies:
  - slug: "xor"
    service: "srvcs-xor"
  - slug: "not"
    service: "srvcs-not"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "json"
    required: true
  - name: "b"
    type: "json"
    required: true
outputs:
  - name: "a"
    type: "json"
  - name: "b"
    type: "json"
  - name: "result"
    type: "boolean"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_NOT_URL"
    default: "http://127.0.0.1:8080"
    purpose: "Base URL for srvcs-not"
  - name: "SRVCS_XOR_URL"
    default: "http://127.0.0.1:8080"
    purpose: "Base URL for srvcs-xor"
