name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: srvcs/platform/.github/workflows/build-service.yml@v2
    with:
      image-name: ${{ github.repository }}
      publish: true
