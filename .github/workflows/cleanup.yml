name: GHCR retention

# Weekly prune of old container image versions for this service, via the shared
# srvcs retention workflow. Runs on a schedule and can be triggered manually.

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  retention:
    uses: srvcs/platform/.github/workflows/ghcr-retention.yml@v2
    with:
      package: ${{ github.event.repository.name }}
